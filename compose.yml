services:
  db:
    build: ./database
    image: tutor-db
    ports:
      - "5432:5432"
    volumes:
      - tutor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: "pg_isready -U rag -d rag"
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rag
      DB_USER: rag
      DB_PASSWORD: rag
    volumes:
      - ${HOME}/.claude:/root/.claude:ro
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: ./ui
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  tutor-db-data:
    external: true
