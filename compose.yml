services:
  db:
    build: ./database
    image: tutor-db
    ports:
      - "5432:5432"
    volumes:
      - tutor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: "pg_isready -U rag -d rag"
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: rag
      DB_USER: rag
      DB_PASSWORD: rag
    volumes:
      - ${HOME}/.claude:/root/.claude:ro
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: ./ui
    ports:
      - "5173:80"
    depends_on:
      - server

  redis:
    image: redis:7-alpine
    volumes:
      - voice-redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  voice:
    build: ./voice
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      STT_WORKERS: 2
      TTS_WORKERS: 2
      TTS_TIMEOUT_MS: 120000
      STT_TIMEOUT_MS: 60000
      JOB_TTL_SECONDS: 3600
    volumes:
      - voice-tts-models:/root/.local/share/tts
    depends_on:
      redis:
        condition: service_healthy

volumes:
  tutor-db-data:
    external: true
  voice-redis-data:
  voice-tts-models:
